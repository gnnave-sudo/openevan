// ========== HELPERS ==========
function getRecColor(rec) {
  return { PROCEED: 'text-emerald-400 bg-emerald-500/20 border-emerald-500/30',
           HOLD: 'text-amber-400 bg-amber-500/20 border-amber-500/30',
           'NO-GO': 'text-red-400 bg-red-500/20 border-red-500/30' }[rec] || 'text-slate-400 bg-slate-500/20';
}
function getPriorityColor(p) {
  return { P0: 'text-red-400 bg-red-500/20', P1: 'text-amber-400 bg-amber-500/20', P2: 'text-blue-400 bg-blue-500/20' }[p] || 'text-slate-400 bg-slate-500/20';
}
function getTierColor(tier) {
  return { HIGH_RISK: 'text-red-400 bg-red-500/20', WEAK: 'text-amber-400 bg-amber-500/20',
           ACCEPTABLE: 'text-blue-400 bg-blue-500/20', STRONG: 'text-emerald-400 bg-emerald-500/20',
           HIGHLY_RELIABLE: 'text-purple-400 bg-purple-500/20' }[tier] || 'text-slate-400 bg-slate-500/20';
}
function dimBar(label, value, max, color) {
  max = max || 100; color = color || 'bg-blue-500';
  return `<div class="mb-2"><div class="flex justify-between text-xs mb-1"><span class="text-slate-400">${label}</span><span class="text-slate-200">${value}</span></div><div class="h-2 bg-slate-800 rounded-full overflow-hidden"><div class="${color} h-full rounded-full" style="width:${Math.min((value/max)*100,100)}%"></div></div></div>`;
}
function riskColor(v) {
  if (v >= 70) return 'bg-red-500';
  if (v >= 50) return 'bg-amber-500';
  if (v >= 30) return 'bg-blue-500';
  return 'bg-emerald-500';
}
function recBadge(rec) {
  return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium border ${getRecColor(rec)}">${rec}</span>`;
}
function priorityBadge(p) {
  return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${getPriorityColor(p)}">${p}</span>`;
}
function tierBadge(tier) {
  return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${getTierColor(tier)}">${tier}</span>`;
}

// ========== APP ==========
const App = {
  currentPage: 'dashboard',

  init() {
    this.setupNavigation();
    this.render();
    // Retry lucide icons if library loads late
    setTimeout(() => {
      if (typeof lucide !== 'undefined' && lucide.createIcons) {
        try { lucide.createIcons(); } catch(e) {}
      }
    }, 300);
  },

  setupNavigation() {
    window.addEventListener('hashchange', () => this.render());
    document.addEventListener('click', (e) => {
      const link = e.target.closest('[data-nav]');
      if (link) { e.preventDefault(); window.location.hash = link.getAttribute('data-nav'); }
    });
  },

  render() {
    const hash = window.location.hash.slice(1) || 'dashboard';
    this.currentPage = hash;
    const main = document.getElementById('main-content');
    main.innerHTML = this.getPageContent(hash);
    this.updateSidebarActive();
    this.afterRender();
    setTimeout(() => {
      if (typeof lucide !== 'undefined' && lucide.createIcons) {
        try { lucide.createIcons(); } catch(e) {}
      }
    }, 10);
  },

  updateSidebarActive() {
    document.querySelectorAll('.nav-link').forEach(el => {
      el.classList.remove('bg-slate-800/50', 'text-slate-100', 'border-l-2', 'border-blue-500');
      el.classList.add('text-slate-400');
      if (el.getAttribute('data-nav') === this.currentPage) {
        el.classList.add('bg-slate-800/50', 'text-slate-100');
        el.classList.remove('text-slate-400');
      }
    });
  },

  afterRender() {
    if (this.currentPage === 'stress-lab') this.initStressLab();
    if (this.currentPage === 'intake') this.initIntake();
    if (this.currentPage === 'credibility') this.initCredibility();
  },

  initIntake() {
    const tabs = document.querySelectorAll('.intake-tab');
    const panels = document.querySelectorAll('.intake-panel');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active', 'border-b-2', 'border-blue-500', 'text-blue-400'));
        tab.classList.add('active', 'border-b-2', 'border-blue-500', 'text-blue-400');
        panels.forEach(p => p.classList.add('hidden'));
        const panel = document.getElementById('panel-' + tab.getAttribute('data-tab'));
        if (panel) panel.classList.remove('hidden');
      });
    });
  },

  initStressLab() {
    document.querySelectorAll('.scenario-header').forEach(h => {
      h.addEventListener('click', () => {
        const body = h.nextElementSibling;
        body.classList.toggle('hidden');

  initCredibility() {
    const sliders = document.querySelectorAll('.cred-slider');
    sliders.forEach(s => {
      s.addEventListener('input', () => {
        const dims = ['obligation_identification','risk_classification','evidence_sufficiency','assumption_transparency','regulator_posture_realism','control_practicality'];
        const weights = [0.25,0.20,0.15,0.15,0.15,0.10];
        let score = 0;
        dims.forEach((d,i) => {
          const el = document.getElementById('slider-'+d);
          const val = el ? parseInt(el.value) : 50;
          score += val * weights[i];
        });
        document.getElementById('live-score').textContent = Math.round(score);
        let tier = 'HIGH_RISK';
        if (score >= 85) tier = 'HIGHLY_RELIABLE';
        else if (score >= 70) tier = 'STRONG';
        else if (score >= 55) tier = 'ACCEPTABLE';
        else if (score >= 40) tier = 'WEAK';
        const tierEl = document.getElementById('live-tier');
        tierEl.textContent = tier;
        tierEl.className = `inline-flex items-center px-3 py-1 rounded-full text-sm font-medium ${getTierColor(tier)}`;
      });
    });
  },

  getPageContent(page) {
    switch (page) {
      case 'dashboard': return this.pageDashboard();
      case 'intake': return this.pageIntake();
      case 'stress-lab': return this.pageStressLab();
      case 'patterns': return this.pagePatterns();
      case 'alignment': return this.pageAlignment();
      case 'outputs': return this.pageOutputs();
      case 'learning': return this.pageLearning();
      case 'credibility': return this.pageCredibility();
      default: return this.pageDashboard();
    }
  },

                <thead><tr class="text-xs text-slate-500 border-b border-slate-700"><th class="text-left pb-2">Control</th><th class="text-right pb-2">Failures</th></tr></thead>
                <tbody>${sortedControls.map(([name,count]) => `<tr class="border-b border-slate-800/50"><td class="py-2 text-slate-300">${name}</td><td class="text-right py-2 text-slate-200 font-mono">${count}</td></tr>`).join('')}</tbody>
              </table>
            </div>
          </div>
        </div>
      </div>`;
  },

  // ========== L4 ALIGNMENT ==========
  pageAlignment() {
    const al = AppData.alignment;
    const dims = [
      { key: 'obligation_identification', label: 'Obligation Identification', weight: 25 },
      { key: 'risk_classification', label: 'Risk Classification', weight: 20 },
      { key: 'evidence_sufficiency', label: 'Evidence Sufficiency', weight: 15 },
      { key: 'assumption_transparency', label: 'Assumption Transparency', weight: 15 },
      { key: 'regulator_posture_realism', label: 'Regulator Posture Realism', weight: 15 }
    ];
    const scoreColor = al.alignment_score >= 80 ? 'text-emerald-400' : al.alignment_score >= 60 ? 'text-amber-400' : 'text-red-400';
    const dimBars = dims.map(d => dimBar(d.label + ' ('+d.weight+'%)', Math.round(al.dimension_scores[d.key]*100), 100, al.dimension_scores[d.key] >= 0.7 ? 'bg-emerald-500' : al.dimension_scores[d.key] >= 0.5 ? 'bg-amber-500' : 'bg-red-500')).join('');
    return `
      <div class="max-w-5xl mx-auto">
        <div class="mb-6"><h1 class="text-2xl font-bold text-slate-100 mb-1">L4 Alignment</h1><p class="text-sm text-slate-400">Counsel memo alignment check</p></div>
        <div class="grid grid-cols-3 gap-4 mb-6">
          <div class="bg-[#111827] border border-slate-800 rounded-xl p-6 text-center">
            <div class="text-xs text-slate-500 mb-2">Alignment Score</div>
            <div class="text-5xl font-bold ${scoreColor}">${al.alignment_score}</div>
            <div class="text-xs text-slate-500 mt-1">/ 100</div>
          </div>
          <div class="bg-[#111827] border border-slate-800 rounded-xl p-4 col-span-2">
            <h4 class="text-sm font-semibold text-slate-200 mb-3">Dimension Scores</h4>
            ${dimBars}
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-6">
          <div class="bg-[#111827] border border-slate-800 rounded-xl p-4">
            <h4 class="text-sm font-semibold text-slate-200 mb-3 flex items-center gap-2"><i data-lucide="alert-octagon" class="w-4 h-4 text-red-400"></i>Missing Regulator Objections</h4>
            ${al.missing_regulator_objections.map(o => `<div class="flex items-start gap-2 mb-2"><span class="text-red-400 mt-0.5">-</span><span class="text-sm text-slate-300">${o}</span></div>`).join('')}
          </div>
          <div class="bg-[#111827] border border-slate-800 rounded-xl p-4">
            <h4 class="text-sm font-semibold text-slate-200 mb-3 flex items-center gap-2"><i data-lucide="link" class="w-4 h-4 text-amber-400"></i>Missing Evidence Hooks</h4>
            ${al.missing_evidence_hooks.map(o => `<div class="flex items-start gap-2 mb-2"><span class="text-amber-400 mt-0.5">!</span><span class="text-sm text-slate-300">${o}</span></div>`).join('')}
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div class="bg-[#111827] border border-slate-800 rounded-xl p-4">
            <h4 class="text-sm font-semibold text-slate-200 mb-3 flex items-center gap-2"><i data-lucide="flag" class="w-4 h-4 text-red-400"></i>Overconfidence Flags</h4>
            ${al.overconfidence_flags.map(f => `<span class="inline-block text-xs px-2 py-1 rounded-full bg-red-500/20 text-red-400 border border-red-500/30 mr-2 mb-2">${f}</span>`).join('')}
          </div>
          <div class="bg-[#111827] border border-slate-800 rounded-xl p-4">
            <h4 class="text-sm font-semibold text-slate-200 mb-3 flex items-center gap-2"><i data-lucide="help-circle" class="w-4 h-4 text-cyan-400"></i>Clarification Questions</h4>
            ${al.suggested_clarification_questions.map((q,i) => `<div class="flex items-start gap-2 mb-2"><span class="text-cyan-400 text-xs mt-1">${i+1}.</span><span class="text-sm text-slate-300">${q}</span></div>`).join('')}
          </div>
        </div>
      </div>`;
  },

  // ========== L5 OUTPUTS ==========
  pageOutputs() {
    const dm = AppData.decisionMemo;
    const ri = AppData.riskIndices;
    const jurisdictions = Object.keys(ri.jurisdiction_risk_index);
    const dimensions = ['Licensing','AML','Conduct','Operational','Reputational','Regulatory','Financial','Cross-border','Consumer','Enforcement'];
    const heatmapData = [
      [72,45,38,50,48,68,42,22,62,55],
      [58,52,35,42,40,55,38,28,48,45],
      [45,48,42,35,30,40,32,25,38,35],
      [38,35,30,32,28,35,25,20,30,28],
      [65,55,42,48,45,60,40,30,55,50]
    ];
    const heatmapHtml = `
      <div class="grid grid-cols-11 gap-px bg-slate-800 rounded-lg overflow-hidden">
        <div class="bg-[#111827] p-2 text-xs text-slate-500"></div>
        ${jurisdictions.map(j => `<div class="bg-[#111827] p-2 text-xs text-slate-400 font-medium text-center">${j}</div>`).join('')}
        ${dimensions.map((dim,di) => `
          <div class="bg-[#111827] p-2 text-xs text-slate-400">${dim}</div>
          ${heatmapData.map((row,ji) => `<div class="p-2 text-center text-xs font-mono" style="background:rgba(${row[di]>=70?'239,68,68':row[di]>=50?'245,158,11':row[di]>=30?'59,130,246':'16,185,129'},${(row[di]/100)*0.6+0.1});color:${row[di]>=50?'#f1f5f9':'#94a3b8'}">${row[di]}</div>`).join('')}
        `).join('')}
      </div>`;
    return `
      <div class="max-w-6xl mx-auto">
        <div class="mb-6"><h1 class="text-2xl font-bold text-slate-100 mb-1">L5 Outputs</h1><p class="text-sm text-slate-400">Decision memo & escalation management</p></div>
        <div class="bg-[#111827] border border-slate-800 rounded-xl p-6 mb-6">
          <div class="flex items-center gap-3 mb-4">
            <i data-lucide="file-text" class="w-5 h-5 text-blue-400"></i>
            <h2 class="font-semibold text-slate-100">${dm.title}</h2>
            ${recBadge('HOLD')}
          </div>
          <div class="grid grid-cols-2 gap-6 mb-4">
            <div>
              <h4 class="text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wide">Executive Summary</h4>
              <p class="text-sm text-slate-300 leading-relaxed">${dm.executive_summary}</p>
            </div>
            <div>
              <h4 class="text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wide">Risk Assessment</h4>
              <p class="text-sm text-slate-300 leading-relaxed">${dm.risk_assessment}</p>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-6">
            <div>
              <h4 class="text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wide">Recommendations</h4>
              ${dm.recommendations.map(r => `<div class="flex items-start gap-2 mb-1"><span class="text-blue-400 mt-0.5">-</span><span class="text-sm text-slate-300">${r}</span></div>`).join('')}
            </div>
            <div>
              <h4 class="text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wide">Next Steps</h4>
              ${dm.next_steps.map(s => `<div class="flex items-start gap-2 mb-1"><span class="text-emerald-400 mt-0.5">-</span><span class="text-sm text-slate-300">${s}</span></div>`).join('')}
            </div>
          </div>
        </div>
        <div class="bg-[#111827] border border-slate-800 rounded-xl p-6 mb-6">
          <h3 class="text-sm font-semibold text-slate-200 mb-4">Risk Heatmap — Jurisdiction x Dimension</h3>
          ${heatmapHtml}
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div class="bg-[#111827] border border-slate-800 rounded-xl p-4">
            <h4 class="text-sm font-semibold text-slate-200 mb-3">Active Escalations</h4>
            <table class="w-full text-sm">
              <thead><tr class="text-xs text-slate-500 border-b border-slate-700"><th class="text-left pb-2">Priority</th><th class="text-left pb-2">Title</th><th class="text-left pb-2">Status</th></tr></thead>
              <tbody>${AppData.escalations.map(e => `<tr class="border-b border-slate-800/50"><td class="py-2">${priorityBadge(e.priority)}</td><td class="py-2 text-slate-300">${e.title}</td><td class="py-2"><span class="text-xs ${e.status === 'open' ? 'text-red-400' : 'text-amber-400'}">${e.status}</span></td></tr>`).join('')}</tbody>
            </table>
          </div>
          <div class="bg-[#111827] border border-slate-800 rounded-xl p-4">
            <h4 class="text-sm font-semibold text-slate-200 mb-3">Control Investments</h4>
            <table class="w-full text-sm">
              <thead><tr class="text-xs text-slate-500 border-b border-slate-700"><th class="text-left pb-2">Control</th><th class="text-right pb-2">Cost</th><th class="text-right pb-2">Reduction</th></tr></thead>
              <tbody>${AppData.controlInvestments.map(c => `<tr class="border-b border-slate-800/50"><td class="py-2 text-slate-300">${c.control_name}</td><td class="text-right py-2 text-slate-200 font-mono">${c.estimated_cost}</td><td class="text-right py-2 text-emerald-400 font-mono">${c.risk_reduction}%</td></tr>`).join('')}</tbody>
            </table>
          </div>
        </div>
      </div>`;
  },

  // ========== L6 LEARNING ==========
  pageLearning() {
    const drifts = AppData.driftDetections;
    const latest = drifts[drifts.length-1];
    const trendDir = latest.current_score < drifts[0].current_score ? 'Improving' : latest.current_score > drifts[0].current_score ? 'Deteriorating' : 'Stable';
    const trendColor = trendDir === 'Improving' ? 'text-emerald-400' : trendDir === 'Deteriorating' ? 'text-red-400' : 'text-amber-400';
    return `
      <div class="max-w-5xl mx-auto">
        <div class="mb-6"><h1 class="text-2xl font-bold text-slate-100 mb-1">L6 Learning</h1><p class="text-sm text-slate-400">Drift detection & pattern learning</p></div>
        <div class="grid grid-cols-3 gap-4 mb-8">
          <div class="bg-[#111827] border border-slate-800 rounded-xl p-4 text-center">
            <div class="text-xs text-slate-500 mb-1">Current Score</div>
            <div class="text-3xl font-bold ${latest.current_score >= 60 ? 'text-red-400' : latest.current_score >= 40 ? 'text-amber-400' : 'text-emerald-400'}">${latest.current_score}</div>
          </div>
          <div class="bg-[#111827] border border-slate-800 rounded-xl p-4 text-center">
            <div class="text-xs text-slate-500 mb-1">Trend Direction</div>
            <div class="text-xl font-bold ${trendColor}">${trendDir}</div>
          </div>
          <div class="bg-[#111827] border border-slate-800 rounded-xl p-4 text-center">
            <div class="text-xs text-slate-500 mb-1">Last Drift</div>
            <div class="text-sm text-slate-300">${latest.detected_at}</div>
            <div class="text-xs ${latest.drift_magnitude > 0 ? 'text-red-400' : 'text-emerald-400'} mt-1">${latest.drift_magnitude > 0 ? '+' : ''}${latest.drift_magnitude}</div>
          </div>
        </div>
        <div class="relative pl-8 mb-8">
          <div class="absolute left-3 top-0 bottom-0 w-px bg-slate-700"></div>
          ${drifts.map((d,i) => `
            <div class="relative mb-6">
              <div class="absolute -left-8 top-1 w-6 h-6 rounded-full ${d.drift_magnitude > 0 ? 'bg-red-500/20 border-red-500/30' : 'bg-emerald-500/20 border-emerald-500/30'} border flex items-center justify-center">
                <i data-lucide="${d.drift_magnitude > 0 ? 'trending-up' : 'trending-down'}" class="w-3 h-3 ${d.drift_magnitude > 0 ? 'text-red-400' : 'text-emerald-400'}"></i>
              </div>
              <div class="bg-[#111827] border border-slate-800 rounded-xl p-4">
                <div class="flex items-center justify-between mb-2">
                  <span class="text-xs font-mono text-slate-500">${d.detected_at}</span>
                  <span class="text-xs font-mono ${d.drift_magnitude > 0 ? 'text-red-400' : 'text-emerald-400'}">${d.previous_score} → ${d.current_score} (${d.drift_magnitude > 0 ? '+' : ''}${d.drift_magnitude})</span>
                </div>
                <div class="text-sm text-slate-300">${d.posture_change}</div>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="bg-[#111827] border border-slate-800 rounded-xl p-4">
          <h4 class="text-sm font-semibold text-slate-200 mb-3">Historical Comparison</h4>
          <table class="w-full text-sm">
            <thead><tr class="text-xs text-slate-500 border-b border-slate-700"><th class="text-left pb-2">Date</th><th class="text-right pb-2">Score</th><th class="text-right pb-2">Change</th><th class="text-left pb-2 pl-4">Posture</th></tr></thead>
            <tbody>
              <tr class="border-b border-slate-800/50"><td class="py-2 text-slate-300">2026-03-01</td><td class="text-right py-2 text-slate-200 font-mono">62</td><td class="text-right py-2 text-slate-500 font-mono">-</td><td class="py-2 pl-4 text-slate-400">Baseline</td></tr>
              ${drifts.map(d => `<tr class="border-b border-slate-800/50"><td class="py-2 text-slate-300">${d.detected_at}</td><td class="text-right py-2 text-slate-200 font-mono">${d.current_score}</td><td class="text-right py-2 font-mono ${d.drift_magnitude > 0 ? 'text-red-400' : 'text-emerald-400'}">${d.drift_magnitude > 0 ? '+' : ''}${d.drift_magnitude}</td><td class="py-2 pl-4 text-slate-400">${d.posture_change}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  },

  // ========== CREDIBILITY ==========
  pageCredibility() {
    const cs = AppData.credibilityScores;
    const weights = [
      { key: 'obligation_identification', label: 'Obligation Identification', weight: 25 },
      { key: 'risk_classification', label: 'Risk Classification', weight: 20 },
      { key: 'evidence_sufficiency', label: 'Evidence Sufficiency', weight: 15 },
      { key: 'assumption_transparency', label: 'Assumption Transparency', weight: 15 },
      { key: 'regulator_posture_realism', label: 'Regulator Posture Realism', weight: 15 },
      { key: 'control_practicality', label: 'Control Practicality', weight: 10 }
    ];
    return `
      <div class="max-w-6xl mx-auto">
        <div class="mb-6"><h1 class="text-2xl font-bold text-slate-100 mb-1">Counsel Credibility</h1><p class="text-sm text-slate-400">Scoring & reliability assessment</p></div>
        <div class="grid grid-cols-3 gap-4 mb-6">
          <div class="col-span-2 bg-[#111827] border border-slate-800 rounded-xl p-6">
            <h3 class="text-sm font-semibold text-slate-200 mb-4">Score Calculator</h3>
            <div class="grid grid-cols-2 gap-x-6 gap-y-3 mb-4">
              <div><label class="block text-xs text-slate-400 mb-1">Counsel Name</label><input type="text" placeholder="Enter counsel name" class="w-full bg-[#0a0e1a] border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 placeholder-slate-600" /></div>
              <div><label class="block text-xs text-slate-400 mb-1">Matter ID</label><input type="text" placeholder="e.g. M-2026-001" class="w-full bg-[#0a0e1a] border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 placeholder-slate-600" /></div>
            </div>
            <div class="grid grid-cols-2 gap-x-6 gap-y-3 mb-4">
              ${weights.map(w => `
                <div>
                  <div class="flex justify-between mb-1"><label class="text-xs text-slate-400">${w.label}</label><span class="text-xs text-slate-500">${w.weight}%</span></div>
                  <input type="range" id="slider-${w.key}" min="0" max="100" value="50" class="cred-slider w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500" />
                  <div class="text-right text-xs text-blue-400 mt-1" id="val-${w.key}">50</div>
                </div>
              `).join('')}
            </div>
          </div>
          <div class="bg-[#111827] border border-slate-800 rounded-xl p-6 flex flex-col items-center justify-center">
            <div class="text-xs text-slate-500 mb-2">Weighted Score</div>
            <div id="live-score" class="text-5xl font-bold text-blue-400 mb-2">50</div>
            <div id="live-tier" class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium ${getTierColor('HIGH_RISK')}">HIGH_RISK</div>
          </div>
        </div>
        <div class="bg-[#111827] border border-slate-800 rounded-xl p-4">
          <h4 class="text-sm font-semibold text-slate-200 mb-3">Counsel Leaderboard</h4>
          <table class="w-full text-sm">
            <thead><tr class="text-xs text-slate-500 border-b border-slate-700"><th class="text-left pb-2">#</th><th class="text-left pb-2">Counsel</th><th class="text-left pb-2">Matter</th><th class="text-right pb-2">Score</th><th class="text-left pb-2 pl-4">Tier</th><th class="text-left pb-2">Breakdown</th></tr></thead>
            <tbody>${cs.sort((a,b)=>b.weighted_score-a.weighted_score).map((c,i) => `
              <tr class="border-b border-slate-800/50">
                <td class="py-3 text-slate-500 font-mono">${i+1}</td>
                <td class="py-3 text-slate-200 font-medium">${c.counsel_name}</td>
                <td class="py-3 text-slate-400 font-mono text-xs">${c.matter_id}</td>
                <td class="py-3 text-right">
                  <div class="flex items-center justify-end gap-2">
                    <div class="w-24 h-2 bg-slate-800 rounded-full overflow-hidden"><div class="${c.weighted_score >= 70 ? 'bg-emerald-500' : c.weighted_score >= 55 ? 'bg-blue-500' : 'bg-amber-500'} h-full rounded-full" style="width:${c.weighted_score}%"></div></div>
                    <span class="font-mono text-slate-200">${c.weighted_score}</span>
                  </div>
                </td>
                <td class="py-3 pl-4">${tierBadge(c.risk_tier)}</td>
                <td class="py-3">
                  <div class="text-xs text-slate-500 space-y-0.5">
                    ${Object.entries(c.dimension_scores).map(([k,v]) => `<div>${k.replace(/_/g,' ')}: <span class="${v>=0.7?'text-emerald-400':v>=0.5?'text-blue-400':'text-amber-400'}">${Math.round(v*100)}</span></div>`).join('')}
                  </div>
                </td>
              </tr>
            `).join('')}</tbody>
          </table>
        </div>
      </div>`;
  }
};

// Immediate init + DOMContentLoaded fallback
App.init();
document.addEventListener('DOMContentLoaded', () => App.init());
</script>

</body>
</html>
